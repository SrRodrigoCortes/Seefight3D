  .note { color: #b7a57b; text-align: center; line-height: 1.6; }
  .blank { margin-top: 20px; min-height: 520px; border: 1px dashed rgba(79,215,255,0.34); border-radius: 10px; background: rgba(255,255,255,0.015); }
