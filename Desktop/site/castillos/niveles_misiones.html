<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺 Niveles y Misiones - Wiki Seefight 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #d4a520;
    --gold-light: #f0c84a;
    --gold-dim: #8a6a10;
    --teal: #2dd4bc;
    --teal-dim: #0e5c50;
    --dark: #06080a;
    --text: #e8dcc0;
    --text-dim: #b7a57b;
  }
  body { background: var(--dark); font-family: 'Crimson Pro', serif; min-height: 100vh; padding: 22px; color: var(--text); }
  .page { max-width: 1460px; margin: 0 auto; background: linear-gradient(180deg, #151008 0%, #0b0905 100%); border: 3px solid var(--gold-dim); box-shadow: 0 0 0 1px #0d0a06, 0 0 0 8px #1a1208, inset 0 0 80px rgba(0,0,0,0.45); border-radius: 8px; padding: 30px 22px 28px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 6px; text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.74rem; letter-spacing: 0.16em; text-transform: uppercase; border: 1px solid rgba(212,165,32,0.42); background: rgba(8,8,8,0.88); color: var(--gold-light); }
  .header { text-align: center; margin-bottom: 20px; }
  .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
  .title { font-family: 'Cinzel Decorative', serif; font-size: 2.3rem; font-weight: 900; color: var(--gold-light); letter-spacing: 0.08em; text-transform: uppercase; display: block; }
  .subtitle { margin-top: 10px; font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-dim); }
  .note { max-width: 960px; margin: 0 auto 24px; text-align: center; color: var(--text-dim); line-height: 1.6; }
  .levels { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
  .level-card { position: relative; min-height: 280px; background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.22)); border: 1px solid rgba(212,165,32,0.16); border-radius: 10px; overflow: hidden; }
  .level-head { padding: 12px 14px; border-bottom: 1px solid rgba(212,165,32,0.1); background: rgba(0,0,0,0.22); display: flex; justify-content: space-between; gap: 10px; align-items: center; }
  .level-name { font-family: 'Cinzel', serif; font-size: 0.98rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-light); }
  .level-req { font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .level-body { padding: 14px; min-height: 220px; display: grid; gap: 12px; align-content: start; }
  .hint { color: var(--text-dim); font-size: 0.95rem; line-height: 1.45; }
  .mission-preview { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .mission-dot { height: 42px; border-radius: 999px; border: 1px dashed rgba(45,212,188,0.35); background: rgba(26,158,138,0.08); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
  .mission-overlay { position: absolute; inset: 0; padding: 14px; background: rgba(7,8,10,0.95); opacity: 0; transform: translateY(8px); transition: 0.2s ease; display: grid; align-content: start; gap: 10px; }
  .level-card:hover .mission-overlay { opacity: 1; transform: translateY(0); }
  .overlay-title { font-family: 'Cinzel Decorative', serif; color: var(--gold-light); letter-spacing: 0.08em; text-transform: uppercase; font-size: 1rem; }
  .mission-list { display: grid; gap: 8px; }
  .mission-item, .pirate-test { border: 1px solid rgba(212,165,32,0.12); background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px 12px; }
  .mission-top { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 4px; }
  .mission-label { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.72rem; color: var(--teal); }
  .mission-slot { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .mission-desc { color: var(--text); font-size: 0.92rem; line-height: 1.35; min-height: 22px; }
  .mission-desc::before { content: 'Espacio para rellenar'; color: var(--text-dim); }
  .pirate-test { border-color: rgba(212,165,32,0.25); background: rgba(212,165,32,0.06); }
  .pirate-test .mission-label { color: var(--gold-light); }
  .footer { margin-top: 22px; text-align: center; color: var(--text-dim); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.24em; text-transform: uppercase; }
  @media (max-width: 700px) {
    .page { padding: 20px 14px 18px; }
    .title { font-size: 1.7rem; }
    .mission-preview { grid-template-columns: repeat(2, 1fr); }
    .level-card { min-height: auto; }
    .mission-overlay {
      position: static;
      inset: auto;
      opacity: 1;
      transform: none;
      margin-top: 12px;
    }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="btn" href="../index.html">⬅ Inicio</a>
      <a class="btn" href="index.html">🏰 Castillos</a>
      <a class="btn" href="niveles_elite.html">⭐ Puntos Elite</a>
    </div>
    <header class="header">
      <span class="icon">🗺</span>
      <span class="title">Niveles y Misiones</span>
      <div class="subtitle">5 misiones por nivel + prueba pirata</div>
    </header>
    <p class="note">Pasa el mouse sobre cada nivel para ver 5 misiones como nodos y la prueba pirata final. Dejo todo listo para que el clan complete nombres, recompensas y requisitos.</p>
    <section class="levels" id="levels"></section>
    <div class="footer">Wiki Seefight 3D • Niveles y misiones</div>
  </div>
  <script>
    const levels = Array.from({ length: 21 }, (_, i) => i + 1);
    const root = document.getElementById('levels');
    root.innerHTML = levels.map((level) => `
      <article class="level-card">
        <div class="level-head">
          <div class="level-name">Nivel ${level}</div>
          <div class="level-req">Requisito: por rellenar</div>
        </div>
        <div class="level-body">
          <div class="hint">Pasa el mouse para ver las misiones de este nivel.</div>
          <div class="mission-preview">
            <div class="mission-dot">N1</div>
            <div class="mission-dot">N2</div>
            <div class="mission-dot">N3</div>
            <div class="mission-dot">N4</div>
            <div class="mission-dot">N5</div>
          </div>
        </div>
        <div class="mission-overlay">
          <div class="overlay-title">Nivel ${level}</div>
          <div class="mission-list">
            <div class="mission-item"><div class="mission-top"><span class="mission-label">Misión 1</span><span class="mission-slot">Nodo</span></div><div class="mission-desc"></div></div>
            <div class="mission-item"><div class="mission-top"><span class="mission-label">Misión 2</span><span class="mission-slot">Nodo</span></div><div class="mission-desc"></div></div>
            <div class="mission-item"><div class="mission-top"><span class="mission-label">Misión 3</span><span class="mission-slot">Nodo</span></div><div class="mission-desc"></div></div>
            <div class="mission-item"><div class="mission-top"><span class="mission-label">Misión 4</span><span class="mission-slot">Nodo</span></div><div class="mission-desc"></div></div>
            <div class="mission-item"><div class="mission-top"><span class="mission-label">Misión 5</span><span class="mission-slot">Nodo</span></div><div class="mission-desc"></div></div>
            <div class="pirate-test"><div class="mission-top"><span class="mission-label">Prueba pirata</span><span class="mission-slot">Acceso al siguiente nivel</span></div><div class="mission-desc"></div></div>
          </div>
        </div>
      </article>
    `).join('');
  </script>
</body>
</html>
